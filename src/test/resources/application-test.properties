## /src/test/resources/application-test.properties
server.address=localhost
server.port=8080
server.servlet.context-path=/northwind-data

info.name=Northwind Data
info.description=Spring Boot Northwind Data Clone
info.version=1.0.0

spring.data.rest.base-path=/api
spring.data.rest.default-page-size=20
spring.data.rest.max-page-size=100
spring.data.jpa.repository-packages=org.llin.demo.northwind.repository
spring.data.jpa.entity-packages-to-scan=org.llin.demo.northwind.entity
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=UTC
spring.jpa.open-in-view=false

# === H2 (used by @DataJpaTest and full tests) ===
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_UPPER=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.jpa.show-sql=true
spring.h2.console.enabled=true

management.info.env-enabled=true
management.endpoints.web.exposure-include=*
management.endpoints.web.exposure-exclude=health,metrics